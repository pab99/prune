<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRÜNE - Jugando Trivia</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Encabezado -->
        <header class="trivia-header">
            <h1 class="brand-title">PRÜNE</h1>
            <p class="brand-subtitle">Marroquinería & Moda</p>
        </header>

        <!-- Contenedor del Juego -->
        <main class="quiz-container">
            <div id="question-box">
                <h2 id="question-text">Cargando pregunta...</h2>
                <div id="options-container" class="options-grid">
                    <!-- Las opciones se inyectan mediante script.js -->
                </div>
            </div>
            
            <div id="feedback-box" class="hidden">
                <p id="feedback-text"></p>
                <button id="next-btn" class="btn">Siguiente Pregunta</button>
            </div>
        </main>

        <!-- Bloque de Datos Curiosos Dinámicos -->
        <section class="fun-fact-section">
            <h3>¿Sabías qué?</h3>
            <p id="fun-fact-display">Cargando dato curioso...</p>
        </section>

        <!-- Footer con QR hacia la URL de Render -->
        <footer class="trivia-footer">
            <div class="qr-container">
                <p>¡Escaneá para jugar en tu celular!</p>
                <img id="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://prune.onrender.com" alt="QR PRÜNE Trivia">
                <br>
                <a href="https://prune.onrender.com" target="_blank" class="qr-link">prune.onrender.com</a>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
