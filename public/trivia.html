<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia PRÜNE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>PRÜNE Trivia</h1>
            <div class="score-board">
                <span>Pregunta: <id id="current-question">1</id>/<span id="total-questions">5</span></span>
                <span>Puntaje: <id id="score">0</id></span>
            </div>
        </header>

        <div class="quiz-box">
            <div id="question-container">
                <p id="question-text">Cargando pregunta...</p>
                <div id="options-container"></div>
            </div>
            <div id="feedback" class="hidden">
                <p id="feedback-text"></p>
                <button id="next-btn" class="btn">Siguiente</button>
            </div>
        </div>

        <div class="fact-box">
            <h3>¿Sabías qué?</h3>
            <p id="fact-text">Cargando dato curioso...</p>
        </div>

        <footer>
            <div class="qr-box">
                <p>¡Escaneá para jugar en tu celular!</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://prune-prap.onrender.com" alt="QR Code">
                <p class="url">prune-prap.onrender.com</p>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
