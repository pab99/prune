<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla Principal - Trivia PRÜNE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="main-screen">
    <div class="screen-layout">
        <div class="left-panel">
            <h1>PRÜNE</h1>
            <h2>RANKING EN VIVO</h2>
            <div id="dashboard">
                <p>Esperando jugadores...</p>
            </div>
        </div>
        <div class="right-panel">
            <div class="qr-container">
                <h3>¡ESCANEÁ Y JUGÁ!</h3>
                <!-- QR apuntando de forma exacta a tu nueva URL en Render -->
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://prune-prap.onrender.com" alt="QR Code">
                <p class="url-text">prune-prap.onrender.com</p>
            </div>
            <div class="fact-container">
                <h3>¿SABÍAS QUÉ?</h3>
                <p id="curiosidad">Cargando datos curiosos...</p>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let curiosidades = [];
        let curiosidadIndex = 0;

        // Escucha original para actualizar el ranking en vivo
        socket.on('updateDashboard', (jugadores) => {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';

            // Ordenar jugadores por puntaje de mayor a menor
            const ordenados = jugadores.sort((a, b) => b.score - a.score);

            ordenados.slice(0, 10).forEach((j, index) => {
                const div = document.createElement('div');
                div.className = 'player-row';
                if (j.completed) div.classList.add('completed');
                div.innerHTML = `
                    <span class="position">#${index + 1}</span>
                    <span class="name">${j.username}</span>
                    <span class="score">${j.score} pts</span>
                `;
                dashboard.appendChild(div);
            });

            if (ordenados.length === 0) {
                dashboard.innerHTML = '<p>Esperando jugadores...</p>';
            }
        });

        // Carga dinámica de los nuevos datos curiosos de PRÜNE
        fetch('/api/contenido')
            .then(res => res.json())
            .then(data => {
                curiosidades = data.datosCuriosos;
                if (curiosidades && curiosidades.length > 0) {
                    mostrarSiguienteCuriosidad();
                    setInterval(mostrarSiguienteCuriosidad, 10000); // Rotación cada 10 segundos original
                }
            });

        function mostrarSiguienteCuriosidad() {
            const p = document.getElementById('curiosidad');
            p.textContent = curiosidades[curiosidadIndex];
            curiosidadIndex = (curiosidadIndex + 1) % curiosidades.length;
        }
    </script>
</body>
</html>
